<!DOCTYPE html>
<html lang="en">

<head>
    <title>Blog Post - Sidharth Padmanabhan</title>
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Reenie+Beanie&display=swap" rel="stylesheet">

    <link rel="stylesheet" type="text/css" href="/src/css/style.css">
    <link rel="stylesheet" type="text/css" href="/src/css/social-icons.css">

    <style>
        #post-content {
            max-width: var(--max-width);
            margin: 0 auto;
            color: var(--color-text-sub);
        }
        #post-content .post-meta {
            font-size: 0.9em;
            color: var(--color-text-muted);
            margin: 4px 0 32px;
            letter-spacing: 0.01em;
        }
        #post-content h1, #post-content h2, #post-content h3 {
            color: var(--color-text-main);
            margin-top: 1.5em;
            margin-bottom: 0.5em;
            font-family: var(--font-main);
        }
        #post-content h1 {
            font-size: var(--fs-h1);
            letter-spacing: -0.03em;
            font-weight: var(--fw-medium);
            margin-bottom: 8px;
            margin-top: 20px;
        }
        #post-content h2 {
            font-size: var(--fs-h2);
            font-weight: var(--fw-regular);
        }
        #post-content img {
            max-width: 100%;
            height: auto;
            border-radius: var(--border-radius);
            margin: 20px 0 6px;
            border: 1px solid var(--color-border-light);
        }
        #post-content figcaption {
            display: block;
            font-size: 0.82em;
            color: var(--color-text-muted);
            font-style: italic;
            line-height: 1.5;
            margin: 0 0 20px;
            padding-top: 6px;
            border-top: 1px solid var(--color-border-light);
        }
        #post-content figcaption b {
            font-style: normal;
            color: var(--color-text-sub);
        }
        #post-content p {
            line-height: var(--lh-body);
            margin-bottom: 16px;
            font-size: var(--fs-base);
            text-align: justify;
        }
        #post-content ul, #post-content ol {
            margin-bottom: 16px;
            padding-left: 20px;
            line-height: var(--lh-body);
        }
        #post-content li {
            margin-bottom: 8px;
        }
        #post-content pre {
            background-color: var(--color-border-light);
            padding: 16px;
            border-radius: var(--border-radius);
            overflow-x: auto;
            margin-bottom: 16px;
        }
        #post-content code {
            font-family: monospace;
            background-color: var(--color-border-light);
            padding: 0.2em 0.4em;
            border-radius: 3px;
            font-size: 0.9em;
            color: var(--color-text-main);
        }
        #post-content pre code {
            background-color: transparent;
            padding: 0;
        }
        #post-content blockquote {
            border-left: 4px solid var(--color-border);
            margin: 0 0 16px 0;
            padding-left: 16px;
            color: var(--color-text-muted);
            font-style: italic;
        }
        /* Scrollable table wrapper for mobile */
        #post-content .table-wrapper {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin: 24px 0;
            border-radius: var(--border-radius);
        }
        #post-content table {
            width: 100%;
            min-width: 400px; /* prevents columns from collapsing too narrow */
            border-collapse: collapse;
            margin: 0;
            font-size: 0.95em;
        }
        #post-content th, #post-content td {
            border: 1px solid var(--color-border);
            padding: 10px 14px;
            text-align: left;
            word-break: break-word;
        }
        #post-content th {
            background-color: var(--color-border-light);
            font-weight: var(--fw-bold);
            color: var(--color-text-main);
            white-space: nowrap;
        }
        #post-content tbody tr:nth-of-type(even) {
            background-color: rgba(0, 0, 0, 0.02);
        }
        @media (max-width: 600px) {
            #post-content th, #post-content td {
                padding: 8px 10px;
                font-size: 0.88em;
            }
        }

        /* ── BibTeX reference cards ── */
        .ref-list {
            list-style: none;
            padding: 0;
            margin: 0 0 16px 0;
        }
        .ref-card {
            display: flex;
            gap: 14px;
            align-items: flex-start;
            padding: 14px 16px;
            margin-bottom: 10px;
            border: 1px solid var(--color-border);
            border-radius: var(--border-radius);
            background: var(--color-border-light);
            font-size: 0.88em;
            line-height: 1.55;
        }
        .ref-card .ref-num {
            flex-shrink: 0;
            font-weight: var(--fw-bold);
            color: var(--color-text-muted);
            font-size: 0.82em;
            padding-top: 2px;
        }
        .ref-card .ref-body { flex: 1; }
        .ref-card .ref-authors { font-weight: var(--fw-medium); color: var(--color-text-main); }
        .ref-card .ref-title  { font-style: italic; }
        .ref-card .ref-venue  { color: var(--color-text-muted); font-size: 0.93em; }
        .ref-card .ref-links  { margin-top: 6px; display: flex; gap: 10px; flex-wrap: wrap; }
        .ref-card .ref-links a {
            font-size: 0.82em;
            color: var(--color-accent, #6366f1);
            text-decoration: none;
            border: 1px solid currentColor;
            border-radius: 4px;
            padding: 1px 7px;
            transition: background 0.15s;
        }
        .ref-card .ref-links a:hover { background: rgba(99,102,241,0.08); }

        /* ── Cite This Post ── */
        .cite-section {
            margin-top: 48px;
            padding-top: 32px;
            border-top: 1px solid var(--color-border);
        }
        .cite-section h3 {
            margin: 0 0 16px 0 !important;
            font-size: 1em !important;
            font-weight: var(--fw-bold) !important;
            color: var(--color-text-main) !important;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }
        .cite-code-wrap { position: relative; }
        .cite-code-wrap pre {
            background: var(--color-bg, #fff);
            border: 1px solid var(--color-border);
            border-radius: var(--border-radius);
            padding: 14px 16px;
            font-size: 0.83em;
            overflow-x: auto;
            margin: 0;
            white-space: pre;
        }
        .cite-copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            padding: 4px 12px;
            font-size: 0.78em;
            border: 1px solid var(--color-border);
            border-radius: 4px;
            background: var(--color-border-light);
            cursor: pointer;
            font-family: var(--font-main);
            color: var(--color-text-sub);
            transition: all 0.15s;
        }
        .cite-copy-btn:hover { background: var(--color-text-main); color: var(--color-bg, #fff); }
        .cite-copy-btn.copied { background: #4a7c5e; color: #fff; border-color: #4a7c5e; }
    </style>
</head>

<body>

    <header></header>

    <main class="main-container">
        <div id="post-content"></div>
    </main>

    <footer></footer>

    <script type="module" src="/src/js/header.js"></script>
    <script type="module" src="/src/js/footer.js"></script>
    <script type="module" src="/src/js/script.js"></script>
    <script type="module" src="/src/js/blog-post.js"></script>
</body>

</html>
